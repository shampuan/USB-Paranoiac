[About]
full_text = À Propos d'USB Paranoiac :\n\nVersion 1.0.0(Beta)\nLicence : GPLv3\nLangage de Programmation : Python3\nGUI : PySide6\nProgrammeurs : A. Serhat KILIÇOĞLU (shampuan), Fatih Önder (cektor)\nGithub : www.github.com/shampuan, www.github.com/cektor\n\nCe programme vous permet d'examiner les périphériques de stockage USB suspects avant de les brancher sur votre ordinateur Windows. Ce n'est pas un antivirus; il n'a pas de fonctionnalités de détection ou de nettoyage heuristique ou automatique.\n\nCe programme n'offre aucune garantie.\n\nCopyright (C) 2025 A. Serhat KILIÇOĞLU
