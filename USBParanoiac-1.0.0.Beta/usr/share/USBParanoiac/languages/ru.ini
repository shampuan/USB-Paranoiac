[About]
full_text = О USB Paranoiac:\n\nВерсия 1.0.0(Beta)\nЛицензия: GPLv3\nЯзык Программирования: Python3\nGUI: PySide6\nПрограммисты: А. Серхат КИЛИЧОГЛУ (shampuan), Фатих Ондер (cektor)\nGithub: www.github.com/shampuan, www.github.com/cektor\n\nЭта программа позволяет вам проверить подозрительные USB-накопители перед подключением их к вашему компьютеру с Windows. Это не антивирус; в нем нет эвристических или автоматических функций обнаружения и очистки.\n\nЭта программа не дает никаких гарантий.\n\nАвторское Право (C) 2025 А. Серхат КИЛИЧОГЛУ
