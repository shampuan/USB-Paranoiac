[About]
full_text = USB Paranoiac Haqqında:\n\nVersiya 1.0.0(Beta)\nLisenziya: GPLv3\nProqramlaşdırma Dili: Python3\nGUI: PySide6\nProqramlaşdırma: A. Serhat KILIÇOĞLU (shampuan), Fatih Önder (cektor)\nGithub: www.github.com/shampuan, www.github.com/cektor\n\nBu proqram, Windows kompüterinizə qoşmazdan əvvəl şübhəli USB yaddaş cihazlarını yoxlamağa imkan verir. Bu bir antivirus deyil; heuristik və ya avtomatik aşkar etmə-təmizləmə xüsusiyyətləri yoxdur.\n\nBu proqram heç bir zəmanət vermir.\n\nMüəllif Hüququ (C) 2025 A. Serhat KILIÇOĞLU
