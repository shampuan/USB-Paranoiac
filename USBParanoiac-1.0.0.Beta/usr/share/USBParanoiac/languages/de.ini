[About]
full_text = Über USB Paranoiac:\n\nVersion 1.0.0(Beta)\nLizenz: GPLv3\nProgrammiersprache: Python3\nGUI: PySide6\nProgrammierer: A. Serhat KILIÇOĞLU (shampuan), Fatih Önder (cektor)\nGithub: www.github.com/shampuan, www.github.com/cektor\n\nDieses Programm ermöglicht es Ihnen, verdächtige USB-Speichergeräte zu untersuchen, bevor Sie diese an Ihren Windows-Computer anschließen. Dies ist kein Antivirenprogramm; es verfügt nicht über heuristische oder automatische Erkennungs- und Bereinigungsfunktionen.\n\nDieses Programm wird ohne jegliche Garantie geliefert.\n\nCopyright (C) 2025 A. Serhat KILIÇOĞLU
