[About]
full_text = USB Paranoiac Hakkında:\n\nVersiyon 1.0.0(Beta)\nLisans: GPLv3\nProgramlama Dili: Python3\nGUI: PySide6\nProgramlama: A. Serhat KILIÇOĞLU (shampuan), Fatih Önder (cektor)\nGithub: www.github.com/shampuan, www.github.com/cektor\n\nBu program, windows'lu bilgisayarınıza takmadan evvel şüpheli USB depolama aygıtlarını incelemenizi sağlar. Bu bir antivirüs değildir; heuristik ya da otomatik tespit-temizleme özelliği yoktur.\n\nBu program hiçbir garanti getirmez.\n\nTelif Hakkı (C) 2025 A. Serhat KILIÇOĞLU
